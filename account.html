<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FinalSnap Account</title>
    <meta name="description" content="FinalSnap account portal for sign in, registration, plan, billing, rewards, and Pro access.">
    <link rel="canonical" href="https://finalsnap.cc/account.html">
    <link rel="icon" href="assets/store-icon-128.png">
    <link rel="stylesheet" href="assets/site.css?v=20260530-v19-sandbox">
  </head>
  <body>
    <div class="site-shell">
      <header class="wrap">
        <nav class="site-nav" aria-label="Primary">
          <a class="brand" href="./" aria-label="FinalSnap home">
            <img src="assets/store-icon-128.png" alt="">
            <span>FinalSnap</span>
          </a>
          <div class="nav-links">
            <a href="./">Home</a>
            <a href="pricing.html">Pricing</a>
            <a href="https://finalsnap.cc/account?from=nav">Account</a>
            <a class="store-link" href="https://chromewebstore.google.com/detail/finalsnap/fbplgmgpdnogfbifbcmcadhfnnbcifcd" rel="noopener">Add to Chrome</a>
          </div>
        </nav>
      </header>

      <main>
        <section class="hero">
          <div class="wrap">
            <div class="dark-band">
              <p class="eyebrow">Account handoff</p>
              <h1 class="page-title">Opening FinalSnap Account.</h1>
              <p class="lead">
                The account server handles sign in, registration, plan status,
                billing actions, receipts, rewards, and Pro access.
              </p>
              <p class="note" id="accountStatus">Redirecting to the account server...</p>
              <div class="actions">
                <a class="button primary" href="https://finalsnap.cc/account">Open Account Directly</a>
                <a class="button" href="support.html">Get Support</a>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script>
      const DEFAULT_ACCOUNT_SERVER = "https://finalsnap.cc";
      const params = new URLSearchParams(window.location.search);
      const accountStatus = document.getElementById("accountStatus");

      function normalizeBaseUrl(value) {
        try {
          const url = new URL(String(value || ""));
          if (!["http:", "https:"].includes(url.protocol)) {
            return "";
          }
          return url.origin;
        } catch (_error) {
          return "";
        }
      }

      function isLoopbackOrigin(origin) {
        try {
          const url = new URL(String(origin || ""));
          const host = String(url.hostname || "").toLowerCase();
          return host === "localhost" || host === "127.0.0.1" || host === "::1";
        } catch (_error) {
          return false;
        }
      }

      function isPublicPageContext() {
        const host = String(window.location.hostname || "").toLowerCase();
        return host === "finalsnap.cc"
          || host === "www.finalsnap.cc"
          || host === "hummingbirdteam.github.io";
      }

      function buildAccountUrl() {
        const requestedBase = normalizeBaseUrl(params.get("server") || DEFAULT_ACCOUNT_SERVER);
        const base = (isPublicPageContext() && isLoopbackOrigin(requestedBase))
          ? DEFAULT_ACCOUNT_SERVER
          : requestedBase;
        if (!base) return "";
        const url = new URL("/account", base);
        for (const key of ["install_id", "installId", "account_id", "accountId", "session_token", "sessionToken", "email", "from", "return_to", "returnTo"]) {
          const value = params.get(key);
          if (value) {
            url.searchParams.set(key, value);
          }
        }
        return url.toString();
      }

      const accountUrl = buildAccountUrl();
      if (accountUrl) {
        window.location.replace(accountUrl);
      } else if (accountStatus) {
        accountStatus.textContent = "Account server is not configured.";
      }
    </script>
  </body>
</html>
