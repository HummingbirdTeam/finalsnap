<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FinalSnap Account</title>
    <meta name="description" content="FinalSnap account portal for sign in, registration, plan, billing, and rewards.">
    <link rel="canonical" href="https://finalsnap.cc/account.html">
    <link rel="icon" href="assets/store-icon-128.png">
    <style>
      :root {
        color-scheme: light;
        --ink: #102033;
        --muted: #607082;
        --line: #d8e2ec;
        --bg: #f7fbfd;
        --card: #fff;
        --brand: #0f766e;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }
      .wrap {
        width: min(820px, calc(100% - 40px));
        margin: 0 auto;
      }
      .nav {
        min-height: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: var(--ink);
        font-size: 24px;
        font-weight: 800;
      }
      .brand img {
        width: 34px;
        height: 34px;
        border-radius: 9px;
      }
      .nav a:not(.brand) {
        color: var(--muted);
        text-decoration: none;
        font-weight: 700;
      }
      .hero {
        margin: 18px 0 36px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--card);
        padding: 28px;
      }
      h1 {
        margin: 0;
        font-size: clamp(34px, 5vw, 52px);
        line-height: 1.02;
      }
      p {
        max-width: 640px;
        color: var(--muted);
        line-height: 1.6;
        font-size: 18px;
      }
      .status {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        background: #e8f7f3;
        color: var(--brand);
        font-size: 14px;
        font-weight: 800;
      }
      .foot {
        margin: 30px 0 50px;
        color: var(--muted);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <nav class="nav">
        <a class="brand" href="./" aria-label="FinalSnap home">
          <img src="assets/store-icon-128.png" alt="">
          <span>FinalSnap</span>
        </a>
        <a href="./chrome-extension.html">Chrome Extension</a>
      </nav>

      <section class="hero">
        <h1>FinalSnap Account</h1>
        <p><span class="status" id="accountStatus">Opening your account</span></p>
        <p>
          Your account server decides what to show: signed-in users see account
          and plan details; new users see sign in or registration.
        </p>
      </section>

      <p class="foot">Account, billing, and rewards are handled by the FinalSnap account server.</p>
    </div>
    <script>
      const DEFAULT_ACCOUNT_SERVER = "https://finalsnap.cc";
      const params = new URLSearchParams(window.location.search);
      const accountStatus = document.getElementById("accountStatus");

      function normalizeBaseUrl(value) {
        try {
          const url = new URL(String(value || ""));
          if (!["http:", "https:"].includes(url.protocol)) {
            return "";
          }
          return url.origin;
        } catch (_error) {
          return "";
        }
      }

      function isLoopbackOrigin(origin) {
        try {
          const url = new URL(String(origin || ""));
          const host = String(url.hostname || "").toLowerCase();
          return host === "localhost" || host === "127.0.0.1" || host === "::1";
        } catch (_error) {
          return false;
        }
      }

      function isPublicPageContext() {
        const host = String(window.location.hostname || "").toLowerCase();
        return host === "finalsnap.cc"
          || host === "www.finalsnap.cc"
          || host === "hummingbirdteam.github.io";
      }

      function buildAccountUrl() {
        const requestedBase = normalizeBaseUrl(params.get("server") || DEFAULT_ACCOUNT_SERVER);
        const base = (isPublicPageContext() && isLoopbackOrigin(requestedBase))
          ? DEFAULT_ACCOUNT_SERVER
          : requestedBase;
        if (!base) return "";
        const url = new URL("/account", base);
        for (const key of ["install_id", "installId", "account_id", "accountId", "session_token", "sessionToken", "email", "from", "return_to", "returnTo"]) {
          const value = params.get(key);
          if (value) {
            url.searchParams.set(key, value);
          }
        }
        return url.toString();
      }

      const accountUrl = buildAccountUrl();
      if (accountUrl) {
        window.location.replace(accountUrl);
      } else if (accountStatus) {
        accountStatus.textContent = "Account server is not configured";
      }
    </script>
  </body>
</html>
